base_generic:
  role: |
    You are an expert ontology validator and health economist 
    specializing in Health Technology Assessment (HTA) models. 
    Your primary responsibility is to critically review, audit, 
    and correct existing entities form an ontologies provided 
    to you in [OWL/RDF] format. These ontologies contain data 
    generated by HTA modelers concerning specific interventions, 
    health problems, and populations from the perspective of 
    the Spanish National Health System (SNS). All the entities
    to evaluate follow the follow OWL Ontology:

    {base_ontology}

  constraints: |
    Do not make up information. If context is missing, say so.

preprocessing:
  entity_extraction:
    prompt: |
      Analyze the following medical text generated by an AI.
      Extract all specific clinical entities or individuals mentioned.
      Return ONLY a valid JSON array of strings. Do not include markdown 
      formatting or explanations.
      
      Example output: ["Patient_A", "Metformin_500mg", "Type2_Diabetes"]
      
      Text to analyze:
      {ai_entity}

evaluation_suites:
  owl_validations:
    configurations:
      temperatures: [0.3, 0.6]
      allow_web_search: false
    structural_evaluation:
      prompt: |
        TYPE: Structural Hallucination.
        Evaluate if the following response generates entities or 
        properties that do not exist in the reference ontology, 
        violating schema constraints.
        
        Response to evaluate:
        {individual_response}
        
        Are there any structural violations?

    semantic_evaluation:
      prompt: |
        TYPE: Semantic Hallucination.
        Evaluate if the ontology terms in the response are combined 
        in logically inconsistent ways (e.g., violating domain, range, 
        or class disjunction constraints). Focus strictly on logical 
        consistency.

        Response to evaluate:
        {individual_response}
        
        Are there any logical or semantic violations?

    contextual_evaluation:
      prompt: |
        TYPE: Contextual Hallucination.
        Evaluate if the response fails to meet the original input 
        specifications. Ignore structural OWL validity.
        
        Original User Input:
        {user_input}
        
        Response to evaluate:
        {individual_response}
        
        Does the response fail to address the specific context requested?

    factuality_evaluation:
      allow_web_search: true
      prompt: |
        TYPE: Evidence-based (Factuality) Hallucination.
        Evaluate if the literals, numerical values, or citations 
        produced in the response are unsupported or factually incorrect 
        according to evidence.
        
        Response to evaluate:
        {individual_response}
        
        Are there any factual inaccuracies compared to the provided evidence?